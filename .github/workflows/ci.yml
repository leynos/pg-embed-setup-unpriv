name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Linux Build and Test (${{ matrix.privilege }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        privilege: [unprivileged, root]
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@7da7c6d89033d13cbb1c64803d108ddca97e69c2
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@30a0e04f1870d58f8d717450cc6134995f993c63
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Lint
        run: make lint
      - name: Install cargo-nextest
        run: cargo binstall -y cargo-nextest@0.9.122
      - name: Test with all features (unprivileged)
        if: ${{ matrix.privilege == 'unprivileged' }}
        run: >-
          RUSTFLAGS="-D warnings"
          cargo nextest run --all-targets --all-features
      - name: Test and Measure Coverage (unprivileged)
        if: ${{ matrix.privilege == 'unprivileged' }}
        uses: leynos/shared-actions/.github/actions/generate-coverage@7da7c6d89033d13cbb1c64803d108ddca97e69c2
        with:
          output-path: lcov.info
          format: lcov
          features: dev-worker
          with-default-features: "false"
      - name: Install cargo-nextest and test (root)
        if: ${{ matrix.privilege == 'root' }}
        run: |
          # Worker binary path - staging logic will copy it to /tmp for nobody access
          export PG_EMBEDDED_WORKER="$PWD/target/debug/pg_worker"

          run_as_root() {
            : "${RUSTUP_HOME:=$HOME/.rustup}"
            : "${CARGO_HOME:=$HOME/.cargo}"
            sudo -E env \
              HOME="$HOME" \
              RUSTUP_HOME="$RUSTUP_HOME" \
              CARGO_HOME="$CARGO_HOME" \
              GITHUB_TOKEN="$GITHUB_TOKEN" \
              PG_EMBEDDED_WORKER="$PG_EMBEDDED_WORKER" \
              PATH="$CARGO_HOME/bin:$PATH" \
              "$@"
          }
          run_as_root make test
      - name: Upload coverage data to CodeScene
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: ${{ env.CS_ACCESS_TOKEN && matrix.privilege == 'unprivileged' }}
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@7da7c6d89033d13cbb1c64803d108ddca97e69c2
        with:
          format: lcov
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}

  cross-platform-tests:
    name: Test (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PG_BINARY_CACHE_DIR: ${{ github.workspace }}/.postgres-binary-cache
      PG_TEST_BACKEND: postgresql_embedded
      PG_VERSION_REQ: "=17.4.0"
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@7da7c6d89033d13cbb1c64803d108ddca97e69c2
      - name: Restore PostgreSQL binary cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.PG_BINARY_CACHE_DIR }}
          key: pg-embedded-postgresql-17.4.0-${{ runner.os }}-${{ runner.arch }}
      - name: Install cargo-nextest
        shell: bash
        run: cargo binstall -y cargo-nextest@0.9.122
      - name: Build binaries
        shell: bash
        run: >-
          cargo build
          --no-default-features
          --features cluster-unit-tests,async-api
          --bins
      - name: Run CLI version smoke test
        shell: bash
        env:
          RUNNER_OS: ${{ runner.os }}
        run: |
          set -euo pipefail

          binary=target/debug/pg_embedded_setup_unpriv
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            binary="${binary}.exe"
          fi

          "$binary" --version
      - name: Test unprivileged surface
        shell: bash
        run: >-
          cargo nextest run
          --all-targets
          --no-default-features
          --features cluster-unit-tests,async-api

  binstall-packaging:
    name: Binstall (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      RELEASE_PORT: "8765"
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@7da7c6d89033d13cbb1c64803d108ddca97e69c2
      - name: Install cargo-binstall 1.19.1
        shell: bash
        env:
          RUNNER_OS: ${{ runner.os }}
        run: |
          set -euo pipefail

          requested_binstall_dir="$RUNNER_TEMP/cargo-binstall-1.19.1"
          mkdir -p "$requested_binstall_dir"
          cargo binstall -y \
            --install-path "$requested_binstall_dir" \
            --force \
            cargo-binstall@1.19.1

          effective_binstall_dir="$requested_binstall_dir"
          binstall_bin="$requested_binstall_dir/cargo-binstall"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            binstall_bin="${binstall_bin}.exe"
          fi

          if [[ ! -x "$binstall_bin" ]]; then
            cargo_home_bin="${CARGO_HOME:-$HOME/.cargo}/bin"
            fallback_binstall_bin="$cargo_home_bin/cargo-binstall"
            if [[ "$RUNNER_OS" == "Windows" ]]; then
              fallback_binstall_bin="${fallback_binstall_bin}.exe"
            fi
            if [[ -x "$fallback_binstall_bin" ]]; then
              effective_binstall_dir="$cargo_home_bin"
              binstall_bin="$fallback_binstall_bin"
            fi
          fi

          if [[ ! -x "$binstall_bin" ]]; then
            echo "cargo-binstall 1.19.1 was not found after installation" >&2
            echo "checked $requested_binstall_dir and ${CARGO_HOME:-$HOME/.cargo}/bin" >&2
            exit 1
          fi

          echo "$effective_binstall_dir" >> "$GITHUB_PATH"
          binstall_version="$("$binstall_bin" -V)"
          echo "$binstall_version"
          if [[ "$binstall_version" != *"1.19.1"* ]]; then
            echo "expected cargo-binstall 1.19.1, got $binstall_version" >&2
            exit 1
          fi
      - name: Setup uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
      - name: Build cargo-binstall archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: >-
          uv run --script scripts/release_archive.py
          "$TARGET"
      - name: Install from local cargo-binstall archive
        shell: bash
        env:
          RUNNER_OS: ${{ runner.os }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          install_dir="$PWD/.binstall-bin"
          cert_dir="$RUNNER_TEMP/binstall-cert"
          rm -rf "$install_dir" "$cert_dir"
          mkdir -p "$install_dir" "$cert_dir"

          cat > "$cert_dir/ca.cnf" <<'EOF'
          [ req ]
          prompt = no
          distinguished_name = ca_dn
          x509_extensions = v3_ca
          default_md = sha256
          string_mask = utf8only

          [ ca_dn ]
          O = pg-embed-setup-unpriv
          CN = pg local test CA

          [ v3_ca ]
          subjectKeyIdentifier = hash
          authorityKeyIdentifier = keyid:always
          basicConstraints = critical,CA:TRUE,pathlen:0
          keyUsage = critical,keyCertSign,cRLSign
          EOF
          env MSYS_NO_PATHCONV=1 openssl req -x509 -newkey rsa:2048 -nodes \
            -sha256 \
            -days 1 \
            -set_serial 1 \
            -keyout "$cert_dir/ca.key" \
            -out "$cert_dir/ca.pem" \
            -config "$cert_dir/ca.cnf"

          cat > "$cert_dir/server-req.cnf" <<'EOF'
          [ req ]
          prompt = no
          distinguished_name = server_dn
          default_md = sha256
          string_mask = utf8only

          [ server_dn ]
          O = pg-embed-setup-unpriv
          CN = 127.0.0.1
          EOF
          env MSYS_NO_PATHCONV=1 openssl req -newkey rsa:2048 -nodes \
            -sha256 \
            -keyout "$cert_dir/server.key" \
            -out "$cert_dir/server.csr" \
            -config "$cert_dir/server-req.cnf"
          cat > "$cert_dir/server-ext.cnf" <<'EOF'
          [ server_cert ]
          subjectKeyIdentifier = hash
          authorityKeyIdentifier = keyid,issuer
          basicConstraints = critical,CA:FALSE
          subjectAltName = IP:127.0.0.1
          extendedKeyUsage = serverAuth
          keyUsage = critical,digitalSignature,keyEncipherment
          EOF
          env MSYS_NO_PATHCONV=1 openssl x509 -req \
            -in "$cert_dir/server.csr" \
            -CA "$cert_dir/ca.pem" \
            -CAkey "$cert_dir/ca.key" \
            -set_serial 2 \
            -sha256 \
            -days 1 \
            -out "$cert_dir/server.pem" \
            -extfile "$cert_dir/server-ext.cnf" \
            -extensions server_cert
          openssl verify -x509_strict -purpose sslserver \
            -CAfile "$cert_dir/ca.pem" \
            "$cert_dir/server.pem"

          if command -v python3 >/dev/null 2>&1; then
            python_bin=python3
          else
            python_bin=python
          fi

          CERT_DIR="$cert_dir" "$python_bin" - <<'PY' >"$RUNNER_TEMP/binstall-http.log" 2>&1 &
          from functools import partial
          from http.server import SimpleHTTPRequestHandler, ThreadingHTTPServer
          from pathlib import Path
          import os
          import ssl

          cert_dir = Path(os.environ["CERT_DIR"])
          handler = partial(SimpleHTTPRequestHandler, directory=str(Path("dist").resolve()))
          server = ThreadingHTTPServer(("127.0.0.1", 8765), handler)
          context = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
          context.load_cert_chain(cert_dir / "server.pem", cert_dir / "server.key")
          server.socket = context.wrap_socket(server.socket, server_side=True)
          server.serve_forever()
          PY
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for attempt in {1..30}; do
            # This only gates server readiness; cargo-binstall validates
            # the throwaway CA with --root-certificates below.
            if curl --insecure -fsS "https://127.0.0.1:${RELEASE_PORT}/" >/dev/null; then
              break
            fi
            if [[ "$attempt" -eq 30 ]]; then
              cat "$RUNNER_TEMP/binstall-http.log" >&2
              exit 1
            fi
            sleep 1
          done

          cargo binstall -y \
            --manifest-path Cargo.toml \
            --targets "$TARGET" \
            --strategies crate-meta-data \
            --pkg-url "https://127.0.0.1:${RELEASE_PORT}/{ name }-{ target }-v{ version }{ archive-suffix }" \
            --root-certificates "$cert_dir/ca.pem" \
            --install-path "$install_dir" \
            --force \
            pg-embed-setup-unpriv

          binary_ext=""
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            binary_ext=".exe"
          fi

          test -f "$install_dir/pg_embedded_setup_unpriv${binary_ext}"
          test -f "$install_dir/pg_worker${binary_ext}"
          "$install_dir/pg_embedded_setup_unpriv${binary_ext}" --version
