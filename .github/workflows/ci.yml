name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Linux Build and Test (${{ matrix.privilege }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        privilege: [unprivileged, root]
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@7da7c6d89033d13cbb1c64803d108ddca97e69c2
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@30a0e04f1870d58f8d717450cc6134995f993c63
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Lint
        run: make lint
      - name: Install cargo-nextest
        run: cargo binstall -y cargo-nextest@0.9.122
      - name: Test with all features (unprivileged)
        if: ${{ matrix.privilege == 'unprivileged' }}
        run: >-
          RUSTFLAGS="-D warnings"
          cargo nextest run --all-targets --all-features
      - name: Test and Measure Coverage (unprivileged)
        if: ${{ matrix.privilege == 'unprivileged' }}
        uses: leynos/shared-actions/.github/actions/generate-coverage@7da7c6d89033d13cbb1c64803d108ddca97e69c2
        with:
          output-path: lcov.info
          format: lcov
          features: dev-worker
          with-default-features: "false"
      - name: Install cargo-nextest and test (root)
        if: ${{ matrix.privilege == 'root' }}
        run: |
          # Worker binary path - staging logic will copy it to /tmp for nobody access
          export PG_EMBEDDED_WORKER="$PWD/target/debug/pg_worker"

          run_as_root() {
            : "${RUSTUP_HOME:=$HOME/.rustup}"
            : "${CARGO_HOME:=$HOME/.cargo}"
            sudo -E env \
              HOME="$HOME" \
              RUSTUP_HOME="$RUSTUP_HOME" \
              CARGO_HOME="$CARGO_HOME" \
              GITHUB_TOKEN="$GITHUB_TOKEN" \
              PG_EMBEDDED_WORKER="$PG_EMBEDDED_WORKER" \
              PATH="$CARGO_HOME/bin:$PATH" \
              "$@"
          }
          run_as_root make test
      - name: Upload coverage data to CodeScene
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: ${{ env.CS_ACCESS_TOKEN && matrix.privilege == 'unprivileged' }}
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@7da7c6d89033d13cbb1c64803d108ddca97e69c2
        with:
          format: lcov
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}

  cross-platform-tests:
    name: Test (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PG_BINARY_CACHE_DIR: ${{ github.workspace }}/.postgres-binary-cache
      PG_TEST_BACKEND: postgresql_embedded
      PG_VERSION_REQ: "=17.4.0"
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@7da7c6d89033d13cbb1c64803d108ddca97e69c2
      - name: Restore PostgreSQL binary cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.PG_BINARY_CACHE_DIR }}
          key: pg-embedded-postgresql-17.4.0-${{ runner.os }}-${{ runner.arch }}
      - name: Install cargo-nextest
        shell: bash
        run: cargo binstall -y cargo-nextest@0.9.122
      - name: Build binaries
        shell: bash
        run: >-
          cargo build
          --no-default-features
          --features cluster-unit-tests,async-api
          --bins
      - name: Run CLI version smoke test
        shell: bash
        run: |
          set -euo pipefail

          binary=target/debug/pg_embedded_setup_unpriv
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            binary="${binary}.exe"
          fi

          "$binary" --version
      - name: Test unprivileged surface
        shell: bash
        run: >-
          cargo nextest run
          --all-targets
          --no-default-features
          --features cluster-unit-tests,async-api
